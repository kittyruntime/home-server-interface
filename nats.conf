# HSI NATS configuration
# Change the passwords below before deploying to production.

max_payload: 67108864  # 64 MB

jetstream {
  store_dir: "/data"
}

authorization {
  users: [
    {
      user: "backend"
      password: "backend-dev"
      permissions: {
        publish:   [ "root.>", "_INBOX.>", "$JS.>" ]
        subscribe: [ "events.>", "_INBOX.>", "$JS.>" ]
      }
    }
    {
      user: "worker"
      password: "worker-dev"
      permissions: {
        publish:   [ "events.>", "_INBOX.>", "$JS.>" ]
        subscribe: [ "root.>", "_INBOX.>", "$JS.>" ]
      }
    }
  ]
}
